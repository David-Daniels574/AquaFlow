apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.cicd.yml -o k8s-cicd/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: sonarqube
  name: sonarqube
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: sonarqube
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.cicd.yml -o k8s-cicd/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: sonarqube
    spec:
      containers:
        - image: sonarqube:26.3.0.120487-community
          name: water-cicd-sonarqube
          ports:
            - containerPort: 9000
              protocol: TCP
          volumeMounts:
            - mountPath: /opt/sonarqube/data
              name: sonarqube-data
            - mountPath: /opt/sonarqube/logs
              name: sonarqube-logs
      restartPolicy: Always
      volumes:
        - name: sonarqube-data
          persistentVolumeClaim:
            claimName: sonarqube-data
        - name: sonarqube-logs
          persistentVolumeClaim:
            claimName: sonarqube-logs
