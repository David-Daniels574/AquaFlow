apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.cicd.yml -o k8s-cicd/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: jenkins
  name: jenkins
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: jenkins
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.cicd.yml -o k8s-cicd/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: jenkins
    spec:
      containers:
        - image: jenkins/jenkins:lts
          name: water-cicd-jenkins
          ports:
            - containerPort: 8080
              protocol: TCP
            - containerPort: 50000
              protocol: TCP
          volumeMounts:
            - mountPath: /var/jenkins_home
              name: jenkins-data
      restartPolicy: Always
      volumes:
        - name: jenkins-data
          persistentVolumeClaim:
            claimName: jenkins-data
