<svg width="300" height="200" viewBox="0 0 300 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="200" fill="#f0fdf4"/>
  
  <!-- Ground -->
  <rect x="0" y="150" width="300" height="50" fill="#84cc16"/>
  
  <!-- Plants -->
  <path d="M50 150 Q60 120 70 150" stroke="#16a34a" stroke-width="3" fill="none"/>
  <path d="M50 150 Q55 130 60 150" stroke="#16a34a" stroke-width="2" fill="none"/>
  <path d="M70 150 Q75 130 80 150" stroke="#16a34a" stroke-width="2" fill="none"/>
  
  <path d="M120 150 Q130 110 140 150" stroke="#16a34a" stroke-width="3" fill="none"/>
  <path d="M120 150 Q125 130 130 150" stroke="#16a34a" stroke-width="2" fill="none"/>
  <path d="M140 150 Q145 130 150 150" stroke="#16a34a" stroke-width="2" fill="none"/>
  
  <path d="M200 150 Q210 100 220 150" stroke="#16a34a" stroke-width="3" fill="none"/>
  <path d="M200 150 Q205 125 210 150" stroke="#16a34a" stroke-width="2" fill="none"/>
  <path d="M220 150 Q225 125 230 150" stroke="#16a34a" stroke-width="2" fill="none"/>
  
  <!-- Drip irrigation system -->
  <rect x="40" y="140" width="80" height="5" fill="#6b7280"/>
  <rect x="110" y="140" width="80" height="5" fill="#6b7280"/>
  <rect x="180" y="140" width="80" height="5" fill="#6b7280"/>
  
  <!-- Drip emitters -->
  <circle cx="60" cy="145" r="2" fill="#3b82f6"/>
  <circle cx="80" cy="145" r="2" fill="#3b82f6"/>
  <circle cx="130" cy="145" r="2" fill="#3b82f6"/>
  <circle cx="150" cy="145" r="2" fill="#3b82f6"/>
  <circle cx="200" cy="145" r="2" fill="#3b82f6"/>
  <circle cx="220" cy="145" r="2" fill="#3b82f6"/>
  
  <!-- Water droplets -->
  <circle cx="60" cy="155" r="3" fill="#3b82f6" opacity="0.7"/>
  <circle cx="80" cy="155" r="3" fill="#3b82f6" opacity="0.7"/>
  <circle cx="130" cy="155" r="3" fill="#3b82f6" opacity="0.7"/>
  <circle cx="150" cy="155" r="3" fill="#3b82f6" opacity="0.7"/>
  <circle cx="200" cy="155" r="3" fill="#3b82f6" opacity="0.7"/>
  <circle cx="220" cy="155" r="3" fill="#3b82f6" opacity="0.7"/>
  
  <!-- Title -->
  <text x="150" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#16a34a" font-weight="bold">Smart Gardening</text>
  
  <!-- Decorative elements -->
  <circle cx="20" cy="40" r="2" fill="#16a34a" opacity="0.6"/>
  <circle cx="280" cy="60" r="2" fill="#16a34a" opacity="0.6"/>
</svg>
