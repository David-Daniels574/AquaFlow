# sonar-project.properties
sonar.projectKey=water-conservation-api
sonar.projectName=Water Conservation Flask API
sonar.projectVersion=1.0

# Path to source directories 
sonar.sources=.
sonar.exclusions=tests/**, venv/**, **/*.pyc, Dockerfile, requirements.txt

# Path to test directories
sonar.tests=tests

# Language
sonar.language=py

# Tell SonarQube where to find the coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml