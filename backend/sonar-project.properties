# sonar-project.properties
sonar.projectKey=water-conservation-app
sonar.projectName=Water Conservation Fullstack App
sonar.projectVersion=1.0

# 1. Path to source directories 
# '.' means scan the whole repository (both backend and frontend folders)
sonar.sources=.

# 2. Exclusions (CRITICAL: You MUST exclude node_modules or the scan will take hours and crash)
sonar.exclusions=tests/**, venv/**, **/*.pyc, Dockerfile, requirements.txt, **/node_modules/**, **/build/**, **/dist/**, **/.next/**

# 3. Path to test directories (if you have frontend tests in a different folder, add them separated by a comma)
sonar.tests=tests

# 4. Tell SonarQube where to find the coverage reports
# Backend (Python)
sonar.python.coverage.reportPaths=coverage.xml

# Frontend (TypeScript/JavaScript - update the path if your frontend folder is named differently)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info