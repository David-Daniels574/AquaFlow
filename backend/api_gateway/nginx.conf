events {}

http {
    map $http_x_correlation_id $correlation_id {
        default $http_x_correlation_id;
        "" req-$msec-$connection;
    }

    upstream auth_backend {
        server auth_service:5000;
    }

    upstream supplier_backend {
        server supplier_service:5000;
    }

    upstream booking_backend {
        server booking_service:5000;
    }

    upstream gamification_backend {
        server gamification_service:5000;
    }

    upstream analytics_backend {
        server iot_analytics_service:5000;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Correlation-ID $correlation_id always;

        location = / {
            default_type text/plain;
            return 200 "API Gateway is running";
        }

        location /auth/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            rewrite ^/auth/?(.*)$ /$1 break;
            proxy_pass http://auth_backend;
        }

        location /supplier/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            rewrite ^/supplier/?(.*)$ /$1 break;
            proxy_pass http://supplier_backend;
        }

        location /bookings/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            rewrite ^/bookings/?(.*)$ /$1 break;
            proxy_pass http://booking_backend;
        }

        location /gamification/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            rewrite ^/gamification/?(.*)$ /$1 break;
            proxy_pass http://gamification_backend;
        }

        location /analytics/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            rewrite ^/analytics/?(.*)$ /$1 break;
            proxy_pass http://analytics_backend;
        }
    }
}
