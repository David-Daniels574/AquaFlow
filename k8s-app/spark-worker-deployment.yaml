apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o k8s-app/
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: spark-worker
  name: spark-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: spark-worker
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o k8s-app/
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: spark-worker
    spec:
      enableServiceLinks: false
      containers:
        - args:
            - /opt/spark/bin/spark-class
            - org.apache.spark.deploy.worker.Worker
            - spark://spark-master:7077
          env:
            - name: DB_PASS
              value: password
            - name: DB_USER
              value: user
            - name: SPARK_JDBC_URL
              value: jdbc:postgresql://db:5432/waterdb
          image: apache/spark:3.5.0
          imagePullPolicy: IfNotPresent
          name: spark-worker
          volumeMounts:
            - mountPath: /opt/analytics
              name: spark-worker-cm2
      restartPolicy: Always
      volumes:
        - configMap:
            name: spark-worker-cm2
          name: spark-worker-cm2
